<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HarvestHub — Settings</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0d1117;
        color: #e6edf3;
        padding: 32px;
        max-width: 480px;
        margin: 0 auto;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }
      .header-icon {
        width: 36px;
        height: 36px;
        background: #10b981;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 20px;
        color: #0d1117;
      }
      .header h1 {
        font-size: 18px;
        font-weight: 600;
      }
      .header small {
        display: block;
        color: #7d8590;
        font-size: 12px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        font-weight: 500;
        color: #7d8590;
      }

      input[type="text"] {
        width: 100%;
        padding: 10px 12px;
        background: #161b22;
        border: 1px solid #21262d;
        border-radius: 8px;
        color: #e6edf3;
        font-size: 14px;
        font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
        outline: none;
        transition: border-color 0.15s;
      }
      input[type="text"]:focus {
        border-color: #10b981;
      }

      .hint {
        margin-top: 6px;
        font-size: 12px;
        color: #484f58;
      }

      .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      .btn {
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        border: none;
      }
      .btn-primary {
        background: #10b981;
        color: #0d1117;
      }
      .btn-primary:hover {
        background: #34d399;
      }
      .btn-secondary {
        background: transparent;
        border: 1px solid #21262d;
        color: #7d8590;
      }
      .btn-secondary:hover {
        border-color: #7d8590;
        color: #e6edf3;
      }

      .status {
        display: none;
        margin-top: 14px;
        padding: 10px;
        border-radius: 8px;
        font-size: 13px;
        text-align: center;
      }
      .status.success {
        display: block;
        background: #0d2818;
        color: #10b981;
      }
      .status.error {
        display: block;
        background: #3d1f28;
        color: #f85149;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-icon">H</div>
      <div>
        <h1>HarvestHub Settings</h1>
        <small>Configure your scraping endpoint</small>
      </div>
    </div>

    <label for="api-endpoint">API Endpoint</label>
    <input type="text" id="api-endpoint" placeholder="http://localhost:4000" />
    <div class="hint">
      The URL of your HarvestHub API server. Default: http://localhost:4000
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" id="btn-save">Save Settings</button>
      <button class="btn btn-secondary" id="btn-test">🔌 Test Connection</button>
      <button class="btn btn-secondary" id="btn-reset">Reset to Default</button>
    </div>

    <div class="status" id="status"></div>

    <script src="options.js"></script>
  </body>
</html>
